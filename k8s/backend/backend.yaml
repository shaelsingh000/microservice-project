apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: shaelsingh000/backend:v1
        ports:
        - containerPort: 3000
        env:
        - name: KAFKA_BROKER
          value: kafka:9092

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10

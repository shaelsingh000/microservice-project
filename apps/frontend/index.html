<!DOCTYPE html>
<html>
<body>
  <h1>Order Service</h1>
  <button onclick="sendOrder()">Send Order</button>

  <script>
    function sendOrder() {
      fetch("/api/order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id: Date.now(), item: "test" })
      })
      .then(res => res.json())
      .then(data => alert(JSON.stringify(data)));
    }
  </script>
</body>
</html>

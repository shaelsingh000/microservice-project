apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-platform-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/shaelsingh000/microservices-project
    targetRevision: HEAD
    path: helm/my-platform
    helm:
      valueFiles:
        - ../../environments/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

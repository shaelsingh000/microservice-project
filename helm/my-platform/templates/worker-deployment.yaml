apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
        env:
        - name: KAFKA_BROKER
          value: {{ .Values.kafka.broker }}
